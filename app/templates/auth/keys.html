{% extends "layout/base.html" %}

{% block title %}Регистрационные ключи — {{ site_name }}{% endblock %}

{% block content %}

<main class="main-content">
    <div class="users-page">
        <div class="users-header">
            <h1>Ключи</h1>
            <div class="generate-keys-group">
                <input type="number" id="keys-count" value="1" min="1" max="29">
                <button class="btn-primary btn-narrow" id="generate-keys-btn">
                    <span class="btn-icon add-icon"></span>
                    Генерировать ключи
                </button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="users-filters">
            <div class="filter-group">
                <label for="filter-token">Токен</label>
                <input type="text" id="filter-token" placeholder="Поиск по токену...">
            </div>
            <div class="filter-group">
                <label for="filter-used">Статус</label>
                <select id="filter-used">
                    <option value="">Все</option>
                    <option value="true">Использованные</option>
                    <option value="false">Неиспользованные</option>
                </select>
            </div>
            <button class="btn-secondary" id="apply-filters">Применить</button>
            <button class="btn-secondary" id="clear-filters">Очистить</button>
        </div>

        <!-- Таблица ключей -->
        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Токен</th>
                        <th>ID пользователя</th>
                        <th>Использован</th>
                        <th>Истекает</th>
                        <th>Комментарий</th>
                        <th>Создан</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="keys-table-body">
                    <!-- Ключи будут загружены динамически -->
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div class="pagination" id="pagination">
            <!-- Пагинация будет сгенерирована динамически -->
        </div>
    </div>
</main>

<!-- Модальное окно для редактирования комментария -->
<div id="edit-comment-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Редактировать комментарий</h2>
        <form id="edit-comment-form">
            <input type="hidden" id="edit-key-id">
            <div class="form-group">
                <label for="edit-comment">Комментарий</label>
                <textarea id="edit-comment" name="comment" rows="3"></textarea>
            </div>
            <button type="submit" class="btn-primary">Сохранить</button>
        </form>
    </div>
</div>

<script src="/static/js/keys.js"></script>

{% endblock %}

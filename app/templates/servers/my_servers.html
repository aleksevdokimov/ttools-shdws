{% extends "layout/base.html" %}

{% block title %}Мои серверы — {{ site_name }}{% endblock %}

{% block content %}

{% set dynamic = true %}

<main class="main-content">
    <div class="my-servers-page">
        <div class="my-servers-header">
            <h1>Мои серверы</h1>
        </div>

        <!-- Контейнер для панелей серверов -->
        <div class="servers-list" id="servers-list">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</main>

<!-- Модальное окно выбора сервера -->
<div class="modal" id="server-select-modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Выберите сервер</h2>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="available-servers-list" id="available-servers-list">
                <div class="loading">Загрузка доступных серверов...</div>
            </div>
        </div>
    </div>
</div>

<script>
// Загрузка данных пользователя
async function loadUserData() {
    try {
        const response = await fetch('/auth/me/', {
            credentials: 'include'
        });
        
        if (response.ok) {
            const user = await response.json();
            
            const userLogin = document.getElementById('user-login');
            if (userLogin) {
                userLogin.textContent = user.username;
            }
            
            if (user.selected_server_name) {
                updateNavServer(user.selected_server_name, user.player_name);
            } else {
                updateNavServer(null, null);
            }
            
            if (user.selected_server_id) {
                updateGameLinks(user.selected_server_id);
            }
            
            if (document.getElementById('my-servers-link')) {
                document.getElementById('my-servers-link').style.display = 'flex';
            }
            
            if (user.role_id === 4 || user.role_id === 2) {
                if (document.getElementById('servers-link')) {
                    document.getElementById('servers-link').style.display = 'flex';
                }
            }

            if (user.role_id === 4) {
                if (document.getElementById('users-link')) {
                    document.getElementById('users-link').style.display = 'flex';
                }
            }
        } else {
            window.location.href = '/login';
        }
    } catch (error) {
        console.error('Ошибка загрузки данных пользователя:', error);
    }
}

// Загрузка списка серверов пользователя
async function loadUserServers() {
    try {
        const response = await fetch('/game/user-servers/', {
            credentials: 'include'
        });
        
        if (response.ok) {
            const servers = await response.json();
            renderServers(servers);
        } else if (response.status === 403) {
            window.location.href = '/';
        } else {
            document.getElementById('servers-list').innerHTML = 
                '<div class="error">Ошибка загрузки серверов</div>';
        }
    } catch (error) {
        console.error('Ошибка загрузки серверов:', error);
        document.getElementById('servers-list').innerHTML = 
            '<div class="error">Ошибка загрузки серверов</div>';
    }
}

// Отрисовка списка серверов
function renderServers(servers) {
    const container = document.getElementById('servers-list');
    
    if (servers.length === 0) {
        container.innerHTML = `
            <div class="server-panel add-server-panel" id="add-server-panel">
                <span class="add-icon-large">+</span>
                <span class="add-text">Добавить сервер</span>
            </div>
        `;
        document.getElementById('add-server-panel').addEventListener('click', openServerModal);
        return;
    }
    
    container.innerHTML = servers.map(server => `
        <div class="server-panel ${server.is_active ? 'selected' : ''}" data-server-id="${server.server_id}">
            <div class="server-panel-header">
                <h3 class="server-name">${escapeHtml(server.server_name)}</h3>
                <div class="server-actions">
                    <button class="action-btn select-btn ${server.is_active ? 'active' : ''}"
                            title="${server.is_active ? 'Открепить' : 'Выбрать'}"
                            onclick="selectServer(${server.server_id}, ${server.is_active})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </button>
                    <button class="action-btn delete-btn" title="Удалить" onclick="removeServer(${server.server_id})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="server-panel-body">
                <div class="server-info-row">
                    <span class="server-label">URL:</span>
                    <a href="${escapeHtml(server.server_url)}" target="_blank" class="server-url">${escapeHtml(server.server_url)}</a>
                </div>
                <div class="server-info-row">
                    <span class="server-label">Скорость:</span>
                    <span class="server-speed">${escapeHtml(server.server_speed)}</span>
                </div>
                <div class="server-info-row">
                    <span class="server-label">Игрок:</span>
                    <div class="player-attach-container" data-server-id="${server.server_id}">
                        <div class="player-input-group" id="player-input-group-${server.server_id}" 
                             style="${server.player_name && server.player_verified ? 'display: none;' : 'display: flex;'}">
                            <input type="text" 
                                   class="player-name-input" 
                                   id="player-name-${server.server_id}"
                                   placeholder="Введите имя игрока"
                                   value="${server.player_name && !server.player_verified ? escapeHtml(server.player_name) : ''}">
                            <button class="attach-btn" data-server-id="${server.server_id}">
                                ${server.player_name && !server.player_verified ? 'Перепривязать' : 'Привязать'}
                            </button>
                        </div>
                        <div class="player-display-group" id="player-display-group-${server.server_id}"
                             style="${server.player_name && server.player_verified ? 'display: flex;' : 'display: none;'}">
                            <a href="${escapeHtml(server.server_url)}" target="_blank" class="player-link">
                                ${escapeHtml(server.player_name)}
                            </a>
                            <button class="detach-btn" data-server-id="${server.server_id}" title="Отвязать">
                                ✕
                            </button>
                        </div>
                    </div>
                </div>
                <div class="server-info-row verification-row" data-server-id="${server.server_id}" 
                     id="verification-row-${server.server_id}"
                     style="${server.player_name && !server.player_verified ? 'display: flex;' : 'display: none;'}">
                    <span class="server-label">Код подтверждения:</span>
                    <div class="verification-code-container">
                        <code class="verification-code" id="code-${server.server_id}">${server.verification_code || '...'}</code>
                        <button class="copy-code-btn" data-code="${server.verification_code || ''}" title="Копировать">📋</button>
                    </div>
                </div>
                <div class="server-info-row verification-status" data-server-id="${server.server_id}"
                     id="verification-status-${server.server_id}"
                     style="${server.player_verified ? 'display: flex;' : 'display: none;'}">
                    <span class="server-label">Статус:</span>
                    <span class="verified-badge">✓ Подтверждена</span>
                </div>
            </div>
        </div>
    `).join('') + `
        <div class="server-panel add-server-panel" id="add-server-panel">
            <span class="add-icon-large">+</span>
            <span class="add-text">Добавить сервер</span>
        </div>
    `;
    
    document.getElementById('add-server-panel').addEventListener('click', openServerModal);
}

// Привязка игрока по имени
async function attachPlayer(serverId) {
    const input = document.getElementById(`player-name-${serverId}`);
    const playerName = input.value.trim();
    
    if (!playerName) {
        showToast('Введите имя игрока', 'warning');
        return;
    }
    
    try {
        const response = await fetch(`/game/servers/${serverId}/players/attach`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify({ player_name: playerName })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            showToast(data.detail || 'Ошибка при привязке', 'error');
            return;
        }
        
        if (data.status === 'not_found') {
            showToast(data.message, 'error');
            return;
        }
        
        if (data.status === 'already_verified') {
            showToast('Игрок уже подтверждён', 'info');
            // Обновляем UI
            const inputGroup = document.getElementById(`player-input-group-${serverId}`);
            const displayGroup = document.getElementById(`player-display-group-${serverId}`);
            const verificationRow = document.getElementById(`verification-row-${serverId}`);
            const verificationStatus = document.getElementById(`verification-status-${serverId}`);
            
            if (inputGroup) inputGroup.style.display = 'none';
            if (displayGroup) displayGroup.style.display = 'flex';
            if (verificationRow) verificationRow.style.display = 'none';
            if (verificationStatus) verificationStatus.style.display = 'flex';
            return;
        }
        
        if (data.status === 'pending') {
            showToast('Ожидает подтверждения', 'info');
            const codeElement = document.getElementById(`code-${serverId}`);
            if (codeElement) {
                codeElement.textContent = data.verification_code;
            }
            const verificationRow = document.getElementById(`verification-row-${serverId}`);
            if (verificationRow) {
                verificationRow.style.display = 'flex';
            }
            const copyBtn = document.querySelector(`.copy-code-btn[data-server-id="${serverId}"]`);
            if (copyBtn) {
                copyBtn.setAttribute('data-code', data.verification_code);
            }
            return;
        }
        
        if (data.status === 'success') {
            showToast('Код подтверждения сгенерирован', 'success');
            
            const codeElement = document.getElementById(`code-${serverId}`);
            if (codeElement) {
                codeElement.textContent = data.verification_code;
            }
            
            const verificationRow = document.getElementById(`verification-row-${serverId}`);
            if (verificationRow) {
                verificationRow.style.display = 'flex';
            }
            
            const verificationStatus = document.getElementById(`verification-status-${serverId}`);
            if (verificationStatus) {
                verificationStatus.style.display = 'none';
            }
            
            const copyBtn = document.querySelector(`.copy-code-btn[data-server-id="${serverId}"]`);
            if (copyBtn) {
                copyBtn.setAttribute('data-code', data.verification_code);
            }
            
            const attachBtn = document.querySelector(`.attach-btn[data-server-id="${serverId}"]`);
            if (attachBtn) {
                attachBtn.textContent = 'Перепривязать';
            }
        }
    } catch (error) {
        console.error('Ошибка привязки:', error);
        showToast('Ошибка привязки игрока', 'error');
    }
}

// Отвязка игрока
async function detachPlayer(serverId) {
    if (!confirm('Вы уверены, что хотите отвязать игрока?')) {
        return;
    }
    
    try {
        const response = await fetch(`/game/servers/${serverId}/players/detach`, {
            method: 'POST',
            credentials: 'include'
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            showToast('Игрок отвязан', 'success');
            
            const displayGroup = document.getElementById(`player-display-group-${serverId}`);
            const inputGroup = document.getElementById(`player-input-group-${serverId}`);
            const verificationRow = document.getElementById(`verification-row-${serverId}`);
            const verificationStatus = document.getElementById(`verification-status-${serverId}`);
            
            if (displayGroup) displayGroup.style.display = 'none';
            if (inputGroup) inputGroup.style.display = 'flex';
            if (verificationRow) verificationRow.style.display = 'none';
            if (verificationStatus) verificationStatus.style.display = 'none';
            
            const input = document.getElementById(`player-name-${serverId}`);
            if (input) {
                input.value = '';
            }
            
            const attachBtn = document.querySelector(`.attach-btn[data-server-id="${serverId}"]`);
            if (attachBtn) {
                attachBtn.textContent = 'Привязать';
            }
        } else {
            showToast(data.detail || 'Ошибка отвязки', 'error');
        }
    } catch (error) {
        console.error('Ошибка отвязки:', error);
        showToast('Ошибка отвязки игрока', 'error');
    }
}

// Проверка статуса подтверждения
function startVerificationPolling(serverId) {
    let pollInterval = setInterval(async () => {
        try {
            const response = await fetch(`/game/servers/${serverId}/players/status`, {
                credentials: 'include'
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.has_player && data.is_verified) {
                    clearInterval(pollInterval);
                    
                    const verificationRow = document.getElementById(`verification-row-${serverId}`);
                    const verificationStatus = document.getElementById(`verification-status-${serverId}`);
                    const inputGroup = document.getElementById(`player-input-group-${serverId}`);
                    const displayGroup = document.getElementById(`player-display-group-${serverId}`);
                    
                    if (verificationRow) verificationRow.style.display = 'none';
                    if (verificationStatus) verificationStatus.style.display = 'flex';
                    if (inputGroup) inputGroup.style.display = 'none';
                    if (displayGroup) {
                        displayGroup.style.display = 'flex';
                        const playerLink = displayGroup.querySelector('.player-link');
                        if (playerLink) {
                            playerLink.textContent = data.player_name;
                        }
                    }
                    
                    showToast('Игрок подтверждён!', 'success');
                    loadUserServers();
                }
            }
        } catch (error) {
            console.error('Ошибка проверки статуса:', error);
        }
    }, 5000);
    
    setTimeout(() => {
        if (pollInterval) {
            clearInterval(pollInterval);
        }
    }, 300000);
    
    return pollInterval;
}

// Открытие модального окна выбора сервера
async function openServerModal() {
    const modal = document.getElementById('server-select-modal');
    const listContainer = document.getElementById('available-servers-list');
    
    modal.style.display = 'flex';
    
    try {
        const response = await fetch('/game/servers/active/', {
            credentials: 'include'
        });
        
        if (response.ok) {
            const servers = await response.json();
            
            if (servers.length === 0) {
                listContainer.innerHTML = '<div class="empty">Нет доступных серверов для добавления</div>';
                return;
            }
            
            listContainer.innerHTML = servers.map(server => `
                <div class="available-server-item" onclick="addServer(${server.id})">
                    <div class="available-server-name">${escapeHtml(server.name)}</div>
                    <div class="available-server-info">
                        <span class="server-url-small">${escapeHtml(server.url)}</span>
                        <span class="server-speed-badge">${escapeHtml(server.speed)}</span>
                    </div>
                </div>
            `).join('');
        } else {
            listContainer.innerHTML = '<div class="error">Ошибка загрузки серверов</div>';
        }
    } catch (error) {
        console.error('Ошибка:', error);
        listContainer.innerHTML = '<div class="error">Ошибка загрузки серверов</div>';
    }
}

// Закрытие модального окна
document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('server-select-modal').style.display = 'none';
});

document.getElementById('server-select-modal').addEventListener('click', (e) => {
    if (e.target.id === 'server-select-modal') {
        e.target.style.display = 'none';
    }
});

// Добавление сервера
async function addServer(serverId) {
    try {
        const response = await fetch(`/game/user-servers/?server_id=${serverId}`, {
            method: 'POST',
            credentials: 'include'
        });
        
        if (response.ok) {
            showToast('Сервер добавлен', 'success');
            document.getElementById('server-select-modal').style.display = 'none';
            loadUserServers();
            loadUserData();
        } else {
            const data = await response.json();
            showToast(data.detail || 'Ошибка при добавлении сервера', 'error');
        }
    } catch (error) {
        console.error('Ошибка добавления:', error);
        showToast('Ошибка при добавлении сервера', 'error');
    }
}

// Выбор/открепление сервера
async function selectServer(serverId, isActive) {
    try {
        let url, successMessage;

        if (isActive) {
            url = `/game/user-servers/${serverId}/deselect`;
            successMessage = 'Сервер откреплён';
        } else {
            url = `/game/user-servers/${serverId}/select`;
            successMessage = 'Сервер выбран';
        }
        const response = await fetch(url, {
            method: 'POST',
            credentials: 'include'
        });

        if (response.ok) {
            showToast(successMessage, 'success');
            if (isActive) {
                updateNavServer(null, null);
                updateGameLinks(null);
            } 
            loadUserServers();
            loadUserData();
        } else {
            showToast(`Ошибка при ${isActive ? 'откреплении' : 'выборе'} сервера`, 'error');
        }
    } catch (error) {
        showToast(`Ошибка при ${isActive ? 'откреплении' : 'выборе'} сервера`, 'error');
    }
}

// Удаление сервера
async function removeServer(serverId) {
    if (!confirm('Вы уверены, что хотите удалить этот сервер из списка?')) {
        return;
    }
    
    try {
        const response = await fetch(`/game/user-servers/${serverId}`, {
            method: 'DELETE',
            credentials: 'include'
        });
        
        if (response.ok) {
            showToast('Сервер удалён', 'success');
            loadUserServers();
            loadUserData();
        } else {
            showToast('Ошибка при удалении сервера', 'error');
        }
    } catch (error) {
        console.error('Ошибка удаления:', error);
        showToast('Ошибка при удалении сервера', 'error');
    }
}

// Экранирование HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Обработка выхода
document.getElementById('logout-link').addEventListener('click', async (e) => {
    e.preventDefault();
    
    try {
        const response = await fetch('/auth/logout', {
            method: 'POST',
            credentials: 'include'
        });
        
        if (response.ok) {
            window.location.href = '/login';
        }
    } catch (error) {
        console.error('Ошибка выхода:', error);
    }
});

// Обработчики событий
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('attach-btn')) {
        const serverId = e.target.getAttribute('data-server-id');
        attachPlayer(serverId);
    }
    
    if (e.target.classList.contains('detach-btn')) {
        const serverId = e.target.getAttribute('data-server-id');
        detachPlayer(serverId);
    }
    
    if (e.target.classList.contains('copy-code-btn')) {
        // Получаем код из соседнего элемента code
        const codeElement = e.target.previousElementSibling;
        const code = codeElement ? codeElement.textContent : '';
        
        if (code && code !== '...') {
            // Пробуем использовать clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('Код скопирован!', 'success');
                }).catch(() => {
                    // Если не удалось, пробуем старый метод
                    fallbackCopy(code);
                });
            } else {
                // Для старых браузеров
                fallbackCopy(code);
            }
        }
    }
});

// Fallback функция копирования
function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        showToast('Код скопирован!', 'success');
    } catch (err) {
        showToast('Ошибка копирования', 'error');
    }
    document.body.removeChild(textarea);
}

// Инициализация
loadUserData();
loadUserServers();

// Запускаем проверку статуса для всех серверов
setTimeout(() => {
    document.querySelectorAll('.server-panel').forEach(panel => {
        const serverId = panel.getAttribute('data-server-id');
        const verificationRow = document.getElementById(`verification-row-${serverId}`);
        if (verificationRow && verificationRow.style.display === 'flex') {
            startVerificationPolling(serverId);
        }
    });
}, 2000);
</script>

<style>
.my-servers-page {
    padding: var(--spacing-xl);
    max-width: 900px;
}

.my-servers-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-xl);
}

.my-servers-header h1 {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--text-primary);
}

.servers-list {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
}

.server-panel {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: var(--spacing-md);
    transition: all 0.2s ease;
}

.server-panel:hover {
    border-color: var(--accent);
}

.server-panel.selected {
    background-color: rgba(63, 185, 80, 0.1);
    border-color: var(--success);
}

.server-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-md);
}

.server-name {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
}

.server-actions {
    display: flex;
    gap: var(--spacing-sm);
}

.server-actions .action-btn {
    width: 32px;
    height: 32px;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid var(--border-color);
    background-color: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}

.server-actions .action-btn:hover {
    background-color: var(--border-color);
}

.server-actions .select-btn.active {
    background-color: var(--success);
    border-color: var(--success);
    color: white;
}

.server-actions .delete-btn:hover {
    background-color: var(--error);
    border-color: var(--error);
    color: white;
}

.server-panel-body {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);
}

.server-info-row {
    display: flex;
    gap: var(--spacing-md);
    align-items: center;
}

.server-label {
    font-weight: 500;
    color: var(--text-secondary);
    min-width: 80px;
}

.server-url {
    color: var(--accent);
    text-decoration: none;
}

.server-url:hover {
    text-decoration: underline;
}

.server-speed {
    color: var(--text-primary);
    font-weight: 500;
}

/* Привязка игрока */
.player-attach-container {
    display: flex;
    flex: 1;
}

.player-input-group {
    display: flex;
    gap: var(--spacing-sm);
    width: 100%;
}

.player-name-input {

{% extends "layout/base.html" %}

{% block title %}Серверы — {{ site_name }}{% endblock %}

{% block content %}

<main class="main-content">
    <div class="servers-page">
        <div class="servers-header">
            <h1>Управление серверами</h1>
            <a href="/servers/create" class="btn-primary" id="add-server-btn">
                <span class="btn-icon add-icon"></span>
                Добавить сервер
            </a>
        </div>

        <!-- Фильтры -->
        <div class="servers-filters">
            <div class="filter-group">
                <label for="filter-name">Название</label>
                <input type="text" id="filter-name" placeholder="Поиск по названию...">
            </div>
            <div class="filter-group">
                <label for="filter-active">Статус</label>
                <select id="filter-active">
                    <option value="">Все</option>
                    <option value="true">Активные</option>
                    <option value="false">Неактивные</option>
                    <option value="deleted">Удалённые</option>
                </select>
            </div>
            <button class="btn-secondary" id="apply-filters">Применить</button>
            <button class="btn-secondary" id="clear-filters">Очистить</button>
        </div>

        <!-- Список серверов -->
        <div class="servers-list" id="servers-list">
            <div class="servers-loading">Загрузка...</div>
        </div>

        <!-- Пагинация -->
        <div class="pagination" id="pagination">
            <!-- Пагинация будет добавлена через JS -->
        </div>
    </div>
</main>

<script>
let currentPage = 1;
let currentFilters = {
    name: '',
    is_active: '',
    is_deleted: ''
};

// Загрузка данных пользователя
async function loadUserData() {
    try {
        const response = await fetch('/auth/me/', {
            credentials: 'include'
        });
        
        if (response.ok) {
            const user = await response.json();
            document.getElementById('user-login').textContent = user.username;
            
            // Обновляем отображение сервера в nav
            if (user.selected_server_name) {
                updateNavServer(user.selected_server_name, user.player_name);
            }
            
            // Обновляем ссылки на альянсы, игроков и деревни
            if (user.selected_server_id) {
                updateGameLinks(user.selected_server_id);
            }
            
            // Проверка прав (Админ=4 или Модератор=2)
            if (user.role_id !== 4 && user.role_id !== 2) {
                window.location.href = '/';
            }
        } else {
            window.location.href = '/login';
        }
    } catch (error) {
        console.error('Ошибка загрузки данных пользователя:', error);
    }
}

// Загрузка списка серверов
async function loadServers() {
    try {
        const params = new URLSearchParams({
            page: currentPage,
            per_page: 10,
            ...currentFilters
        });
        
        // Удаляем пустые параметры
        for (const [key, value] of params.entries()) {
            if (!value) params.delete(key);
        }
        
        const response = await fetch(`/game/servers/?${params}`, {
            credentials: 'include'
        });
        
        if (response.ok) {
            const data = await response.json();
            renderServers(data.servers);
            renderPagination(data);
        } else if (response.status === 403) {
            window.location.href = '/';
        } else {
            document.getElementById('servers-list').innerHTML = 
                '<div class="servers-error">Ошибка загрузки данных</div>';
        }
    } catch (error) {
        console.error('Ошибка загрузки серверов:', error);
        document.getElementById('servers-list').innerHTML = 
            '<div class="servers-error">Ошибка загрузки данных</div>';
    }
}

// Отрисовка списка серверов
function renderServers(servers) {
    const container = document.getElementById('servers-list');
    
    if (servers.length === 0) {
        container.innerHTML = '<div class="servers-empty">Серверы не найдены</div>';
        return;
    }
    
    container.innerHTML = servers.map(server => {
        // Парсим настройки сервера
        let settings = { speed: '-', server_type: '-', start_date: null, end_date: null };
        if (server.settings) {
            try {
                settings = typeof server.settings === 'string' ? JSON.parse(server.settings) : server.settings;
            } catch (e) {
                // Используем значения по умолчанию
            }
        }
        
        // Определение статуса
        const now = new Date();
        const isDeleted = !!server.deleted_at;
        const isActive = server.is_active && !isDeleted;
        
        let statusClass = 'status-inactive';
        let statusTitle = 'Неактивен';
        
        if (isActive && settings.start_date && settings.end_date) {
            const startDate = new Date(settings.start_date);
            const endDate = new Date(settings.end_date);
            endDate.setHours(23, 59, 59, 999); // Конец дня
            
            if (now >= startDate && now <= endDate) {
                statusClass = 'status-active'; // Зеленый
                statusTitle = 'Активен';
            } else if (now > endDate) {
                statusClass = 'status-expired'; // Оранжевый
                statusTitle = 'Завершён';
            } else {
                statusClass = 'status-upcoming'; // Скоро начнётся
                statusTitle = 'Скоро начнётся';
            }
        } else if (isActive) {
            statusClass = 'status-active'; // Зеленый - активен без дат
            statusTitle = 'Активен';
        } else if (isDeleted) {
            statusClass = 'status-deleted'; // Серый - удалён
            statusTitle = 'Удалён';
        }
        
        // Форматируем дату последнего обновления (время с сервера в UTC)
        let lastUpdateText = 'Нет данных';
        if (server.last_update_info) {
            // Добавляем 'Z' чтобы JavaScript интерпретировал время как UTC
            const lastUpdate = new Date(server.last_update_info + 'Z');
            lastUpdateText = lastUpdate.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        return `
        <div class="server-row">
            <div class="server-status ${statusClass}" title="${statusTitle}"></div>
            <div class="server-name">${escapeHtml(server.name)}</div>
            <a href="${escapeHtml(server.url)}" target="_blank" class="server-go-to">Go to →</a>
            <div class="server-info-icon" title="${escapeHtml(server.info || 'Описание отсутствует')}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="9" x2="15" y2="9"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="12" y2="17"/>
                </svg>
            </div>
            <div class="server-speed">${escapeHtml(settings.speed || 'x1')}</div>
            <div class="server-type">${escapeHtml(settings.server_type || 'Classic')}</div>
            <div class="server-actions">
                <a href="/game/servers/${server.id}/alliances" class="action-btn alliances" title="Альянсы">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </a>
                <a href="/game/servers/${server.id}/players" class="action-btn players" title="Игроки">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </a>
                <a href="/game/servers/${server.id}/villages" class="action-btn villages" title="Деревни">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </a>
                <a href="/servers/${server.id}/edit" class="action-btn edit" title="Редактировать">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </a>
                ${!server.deleted_at ? `
                <button class="action-btn delete" title="Удалить" onclick="deleteServer(${server.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
                ` : ''}
                ${server.deleted_at ? `
                <button class="action-btn restore" title="Восстановить" onclick="restoreServer(${server.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
                ` : ''}
            </div>
            <div class="server-update-info">
                <button class="action-btn refresh" title="Обновить данные" onclick="refreshServer(${server.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
                <span class="last-update-text" id="last-update-${server.id}">Обновлен: ${lastUpdateText}</span>
            </div>
        </div>
        `;
    }).join('');
}

// Отрисовка пагинации
function renderPagination(data) {
    const pagination = document.getElementById('pagination');
    const { page, pages, total } = data;
    
    if (pages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    
    // Кнопка "Назад"
    if (page > 1) {
        html += `<a href="#" class="pagination-link" data-page="${page - 1}">← Назад</a>`;
    }
    
    // Номера страниц
    const maxVisible = 5;
    let start = Math.max(1, page - Math.floor(maxVisible / 2));
    let end = Math.min(pages, start + maxVisible - 1);
    
    if (end - start < maxVisible - 1) {
        start = Math.max(1, end - maxVisible + 1);
    }
    
    if (start > 1) {
        html += `<a href="#" class="pagination-link" data-page="1">1</a>`;
        if (start > 2) {
            html += `<span class="pagination-ellipsis">...</span>`;
        }
    }
    
    for (let i = start; i <= end; i++) {
        html += `<a href="#" class="pagination-link ${i === page ? 'active' : ''}" data-page="${i}">${i}</a>`;
    }
    
    if (end < pages) {
        if (end < pages - 1) {
            html += `<span class="pagination-ellipsis">...</span>`;
        }
        html += `<a href="#" class="pagination-link" data-page="${pages}">${pages}</a>`;
    }
    
    // Кнопка "Вперёд"
    if (page < pages) {
        html += `<a href="#" class="pagination-link" data-page="${page + 1}">Вперёд →</a>`;
    }
    
    pagination.innerHTML = html;
    
    // Добавляем обработчики
    pagination.querySelectorAll('.pagination-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            currentPage = parseInt(link.dataset.page);
            loadServers();
        });
    });
}

// Экранирование HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Удаление сервера
async function deleteServer(serverId) {
    if (!confirm('Вы уверены, что хотите удалить этот сервер?')) {
        return;
    }
    
    try {
        const response = await fetch(`/game/servers/${serverId}`, {
            method: 'DELETE',
            credentials: 'include'
        });
        
        if (response.ok) {
            showToast('Сервер успешно удалён', 'success');
            loadServers();
        } else {
            showToast('Ошибка при удалении сервера', 'error');
        }
    } catch (error) {
        console.error('Ошибка удаления:', error);
        showToast('Ошибка при удалении сервера', 'error');
    }
}

// Восстановление сервера
async function restoreServer(serverId) {
    try {
        const response = await fetch(`/game/servers/${serverId}/restore`, {
            method: 'POST',
            credentials: 'include'
        });
        
        if (response.ok) {
            showToast('Сервер успешно восстановлен', 'success');
            loadServers();
        } else {
            showToast('Ошибка при восстановлении сервера', 'error');
        }
    } catch (error) {
        console.error('Ошибка восстановления:', error);
        showToast('Ошибка при восстановлении сервера', 'error');
    }
}

// Обновление данных сервера
async function refreshServer(serverId) {
    try {
        showToast('Обновление данных сервера...', 'info');
        
        const response = await fetch(`/game/servers/${serverId}/update-map`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        
        if (result.status === 'success') {
            let message = `Данные сервера обновлены: ${result.server_name}`;
            if (result.stats) {
                message += ` (${result.stats.villages_processed || 0} деревень, ${result.stats.players_processed || 0} игроков, ${result.stats.alliances_processed || 0} альянсов)`;
            }
            if (result.last_update_info) {
                // Добавляем 'Z' чтобы JavaScript интерпретировал время как UTC
                const updateDate = new Date(result.last_update_info + 'Z');
                const formattedDate = updateDate.toLocaleString('ru-RU', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                message += `\nПоследнее обновление: ${formattedDate}`;
                
                // Обновляем время в списке серверов
                const lastUpdateElement = document.getElementById(`last-update-${serverId}`);
                if (lastUpdateElement) {
                    const shortDate = updateDate.toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    lastUpdateElement.textContent = `Обновлен: ${shortDate}`;
                }
            }
            showToast(message, 'success');
        } else {
            let errorMsg = result.error || result.reason || 'Неизвестная ошибка';
            showToast(`Ошибка обновления: ${errorMsg}`, 'error');
        }
        
    } catch (error) {
        console.error('Refresh server error:', error);
        showToast('Ошибка при обновлении сервера: ' + error.message, 'error');
    }
}

// Обработчики фильтров
document.getElementById('apply-filters').addEventListener('click', () => {
    const isDeletedValue = document.getElementById('filter-active').value;
    
    currentFilters = {
        name: document.getElementById('filter-name').value,
        is_active: isDeletedValue === 'deleted' ? '' : isDeletedValue,
        is_deleted: isDeletedValue === 'deleted' ? 'true' : (isDeletedValue === '' ? '' : '')
    };
    
    // Если выбраны "Удалённые", передаём is_deleted=true
    if (isDeletedValue === 'deleted') {
        currentFilters.is_deleted = 'true';
        currentFilters.is_active = '';
    } else if (isDeletedValue === '') {
        // Для "Все" - не фильтруем по удалённым
        currentFilters.is_deleted = '';
    } else {
        // Для активных/неактивных - показываем только неудалённые
        currentFilters.is_deleted = 'false';
    }
    
    currentPage = 1;
    loadServers();
});

document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('filter-name').value = '';
    document.getElementById('filter-active').value = '';
    currentFilters = { name: '', is_active: '', is_deleted: '' };
    currentPage = 1;
    loadServers();
});

// Обработка выхода
document.getElementById('logout-link').addEventListener('click', async (e) => {
    e.preventDefault();
    
    try {
        const response = await fetch('/auth/logout', {
            method: 'POST',
            credentials: 'include'
        });
        
        if (response.ok) {
            window.location.href = '/login';
        }
    } catch (error) {
        console.error('Ошибка выхода:', error);
    }
});

// Инициализация
loadUserData();
loadServers();
</script>

<style>

    padding: var(--spacing-xl);
    max-width: 1400px;
